worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;

  # Cache paths under /tmp so the container can run as a non-root user.
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  access_log /dev/stdout;

  server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for static assets (none right now, but ready for future)
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
      expires 7d;
      add_header Cache-Control "public";
    }

    # Don't cache index.html so deploys are seen immediately
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
